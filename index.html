<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework Electronic Diary v1.1.0 (cut down version, for English users only)</title>
    <style>
        :root {
            --bg-color: #0b0c10; --card-bg: #1f2833; --text-color: #c5c6c7;
            --accent-color: #66fcf1; --success-color: #03dac6; --danger-color: #ff4a5a;
            --share-btn-bg: #1f4068; --share-btn-border: #0077b6;
        }
        [data-theme="matrix"] {
            --bg-color: #050d06; --card-bg: #0d1f10; --text-color: #a2caa5;
            --accent-color: #00ff41; --success-color: #39ff14; --danger-color: #990000;
            --share-btn-bg: #143318; --share-btn-border: #00ff41;
        }
        [data-theme="cyberpunk"] {
            --bg-color: #1a0826; --card-bg: #2c103f; --text-color: #f0e6f6;
            --accent-color: #fcee0a; --success-color: #00f0ff; --danger-color: #ff0055;
            --share-btn-bg: #471465; --share-btn-border: #fcee0a;
        }
        [data-theme="sakura"] {
            --bg-color: #2b1f24; --card-bg: #413037; --text-color: #f7e6ec;
            --accent-color: #ffb7c5; --success-color: #a8e6cf; --danger-color: #ff8b94;
            --share-btn-bg: #5a3d47; --share-btn-border: #ffb7c5;
        }
        [data-theme="crimson"] {
            --bg-color: #0d0405; --card-bg: #1f1113; --text-color: #f5e6e7;
            --accent-color: #ff2e44; --success-color: #ff0055; --danger-color: #990011;
            --share-btn-bg: #50121a; --share-btn-border: #ff2e44;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 30px 15px; position: relative; transition: background-color 0.3s ease, color 0.3s ease;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .settings-trigger {
            position: absolute; top: 20px; right: 20px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            color: var(--accent-color); font-size: 24px; padding: 10px; border-radius: 50%; cursor: pointer;
            width: auto; margin: 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(0,0,0,0.5); transition: all 0.3s ease;
        }
        .settings-trigger:hover { transform: rotate(45deg); box-shadow: 0 0 15px var(--accent-color); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 5px 25px rgba(0,0,0,0.6);
        }
        .modal h2 { margin-top: 0; color: var(--accent-color); }
        .select-custom {
            width: 100%; padding: 12px; background: #0b0c10; color: #fff; border: 1px solid #45a29e; border-radius: 6px; font-size: 16px; margin: 10px 0 20px 0; box-sizing: border-box;
        }
        .select-custom:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 12px var(--accent-color); }
        .btn-close-modal {
            width: 100%; padding: 12px; margin: 5px 0 0 0; border-radius: 6px; background: var(--accent-color); color: #0b0c10; font-weight: bold; font-size: 18px; border: none; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; box-sizing: border-box;
        }
        .btn-close-modal:hover { box-shadow: 0 0 15px var(--accent-color); transform: translateY(-2px); }
        h1 { text-align: center; color: var(--accent-color); font-size: 32px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--accent-color); margin-bottom: 30px; padding-right: 40px; }
        .form-group { background: var(--card-bg); padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        label { font-weight: bold; font-size: 16px; color: #fff; display: block; margin-bottom: 5px; }
        input, textarea, select.subject-select {
            width: 100%; padding: 12px; margin: 5px 0 20px 0; border-radius: 6px; border: 1px solid #45a29e; background: #0b0c10; color: #fff; font-size: 16px; box-sizing: border-box; transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:focus, textarea:focus, select.subject-select:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 12px var(--accent-color); }
        .btn-add-main { width: 100%; padding: 12px; margin: 5px 0 0 0; border-radius: 6px; background: var(--accent-color); color: #0b0c10; font-weight: bold; font-size: 18px; border: none; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; box-sizing: border-box; }
        .btn-add-main:hover { box-shadow: 0 0 15px var(--accent-color); transform: translateY(-2px); }
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .task-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); border-top: 5px solid var(--accent-color); box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: space-between; transition: all 0.3s ease; }
        .task-card.completed { border-top-color: var(--success-color); opacity: 0.5; }
        .task-card h3 { margin: 0 0 10px 0; font-size: 20px; color: #fff; }
        .task-card p { margin: 0 0 15px 0; color: #a4a7ab; font-size: 15px; line-height: 1.4; word-break: break-word; }
        .task-card .date { font-size: 13px; color: #45a29e; margin-bottom: 5px; }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-done, .btn-del { width: 100%; padding: 8px; border-radius: 6px; font-size: 14px; cursor: pointer; box-sizing: border-box; transition: all 0.2s ease; font-weight: bold; text-transform: uppercase; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-done { background: #1f2833; border: 2px solid var(--accent-color); color: var(--accent-color); }
        .btn-done:hover { background: var(--accent-color); color: #000; }
        .task-card.completed .btn-done { border-color: var(--success-color); color: var(--success-color); }
        .task-card.completed .btn-done:hover { background: var(--success-color); color: #000; }
        .btn-del { background: transparent; border: 2px solid var(--danger-color); color: var(--danger-color); }
        .btn-del:hover { background: var(--danger-color); color: #fff; }
        .notes-group { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-top: 40px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .notes-textarea { width: 100%; height: 100px; background: #0b0c10; border: 1px dashed #45a29e; border-radius: 6px; color: #fff; padding: 12px; font-size: 15px; box-sizing: border-box; resize: vertical; font-family: inherit; margin-top: 10px; transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .notes-textarea:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 12px var(--accent-color); }
        .export-box { text-align: center; margin-top: 30px; }
        .btn-share {
            width: 100%; background: var(--share-btn-bg); color: #fff; border: 1px solid var(--share-btn-border); padding: 15px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; box-sizing: border-box; transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.2s ease;
        }
        .btn-share:hover { box-shadow: 0 0 15px var(--share-btn-border); }
    </style>
</head>
<body>
    <button class="settings-trigger" onclick="toggleModal(true)">⚙️</button>
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙️ Settings</h2>
            <label>Visual Theme:</label>
            <select class="select-custom" id="themeSelect" onchange="changeTheme(this.value)">
                <option value="neon">Default</option>
                <option value="matrix">Matrix</option>
                <option value="cyberpunk">Cyberpunk</option>
                <option value="sakura">Sakura</option>
                <option value="crimson">Crimson</option>
            </select>
            <button class="btn-close-modal" onclick="toggleModal(false)">CLOSE</button>
        </div>
    </div>
    <div class="container">
        <h1>📚 Homework Electronic Diary</h1>
        <div class="form-group">
            <label>Subject:</label>
            <select id="subject" class="subject-select"></select>
            <label>Homework assignment:</label>
            <textarea id="taskText" rows="3" placeholder="What needs to be done..."></textarea>
            <label>Deadline:</label>
            <input type="date" id="deadline">
            <button onclick="addTask()" class="btn-add-main">➕ Add to Diary</button>
        </div>
        <h2>📋 Current Tasks</h2>
        <div class="task-grid" id="taskList"></div>
        <div class="notes-group">
            <label>📝 Notes:</label>
            <textarea id="diaryNotes" class="notes-textarea" placeholder="Write important announcements here..."></textarea>
        </div>
        <div class="export-box">
            <button class="btn-share" onclick="exportData()">📋 Copy homework for the class</button>
        </div>
    </div>
    <script>
        let timerInterval = null; let currentTheme = 'neon';
        const subjectsData = [
            { id: "m1", emoji: "🧮", en: "Mathematics" }, { id: "m2", emoji: "📐", en: "Algebra" }, { id: "m3", emoji: "📏", en: "Geometry" },
            { id: "l1", emoji: "📖", en: "Russian Language" }, { id: "l2", emoji: "📚", en: "Literature" }, { id: "eng", emoji: "🇬🇧", en: "English" },
            { id: "phys", emoji: "⚛️", en: "Physics" }, { id: "chem", emoji: "🧪", en: "Chemistry" }, { id: "hist", emoji: "⏳", en: "History" },
            { id: "soc", emoji: "⚖️", en: "Social Studies" }, { id: "bio", emoji: "🌿", en: "Biology" }, { id: "geo", emoji: "🌍", en: "Geography" },
            { id: "inf", emoji: "💻", en: "Computer Science" }, { id: "sport", emoji: "⚽", en: "Physical Education" }, { id: "other", emoji: "📘", en: "Other Subject" }
        ];
        document.addEventListener("DOMContentLoaded", init);
        function init() {
            currentTheme = localStorage.getItem("diary_theme") || "neon"; document.getElementById("themeSelect").value = currentTheme;
            document.documentElement.setAttribute("data-theme", currentTheme); document.getElementById('deadline').valueAsDate = new Date();
            const selectEl = document.getElementById("subject");
            subjectsData.forEach(item => {
                const opt = document.createElement("option"); opt.value = item.id; opt.innerText = `${item.emoji} ${item.en}`; selectEl.appendChild(opt);
            });
            renderTasks(); document.getElementById("diaryNotes").value = localStorage.getItem("diary_notes_data") || "";
            document.getElementById("diaryNotes").oninput = function() { localStorage.setItem("diary_notes_data", this.value); };
            if (timerInterval) clearInterval(timerInterval); timerInterval = setInterval(updateAllTimers, 1000);
        }
        function toggleModal(show) { document.getElementById("settingsModal").style.display = show ? "flex" : "none"; }
        function changeTheme(theme) { currentTheme = theme; localStorage.setItem("diary_theme", theme); document.documentElement.setAttribute("data-theme", theme); renderTasks(); }
        function getTasks() { return JSON.parse(localStorage.getItem("school_tasks")) || []; }
        function saveTasks(tasks) { localStorage.setItem("school_tasks", JSON.stringify(tasks)); }
        function addTask() {
            const subjectId = document.getElementById("subject").value; const text = document.getElementById("taskText").value.trim();
            const deadline = document.getElementById("deadline").value; if (!text) { alert("Please fill in the task text field!"); return; }
            const tasks = getTasks(); tasks.push({ id: Date.now(), subjectId: subjectId, text: text, deadline: deadline, completed: false });
            saveTasks(tasks); renderTasks(); document.getElementById("taskText").value = "";
        }
        function toggleTask(id) { const tasks = getTasks().map(t => { if (t.id === id) t.completed = !t.completed; return t; }); saveTasks(tasks); renderTasks(); }
        function deleteTask(id) { if (confirm("Are you sure you want to delete this record?")) { const tasks = getTasks().filter(t => t.id !== id); saveTasks(tasks); renderTasks(); } }
        function renderTasks() {
            const taskList = document.getElementById("taskList"); taskList.innerHTML = ""; const tasks = getTasks();
            if (tasks.length === 0) { taskList.innerHTML = `<p style='grid-column: 1/-1; text-align:center; color:#666;'>No tasks found. Add your first assignment!</p>`; return; }
            tasks.forEach(task => {
                const card = document.createElement("div"); card.className = `task-card ${task.completed ? 'completed' : ''}`;
                const dateObj = new Date(task.deadline); const formattedDate = isNaN(dateObj) ? task.deadline : dateObj.toLocaleDateString("en-US");
                const sData = subjectsData.find(s => s.id === task.subjectId) || subjectsData[subjectsData.length - 1];
                let timerHtml = `<div class="live-timer" id="timer-${task.id}" data-deadline="${task.deadline}" data-id="${task.id}" style="font-weight: bold; margin-top: 5px;"></div>`;
                card.innerHTML = `
                    <div><h3>${sData.emoji} ${sData.en}</h3><p>${task.text}</p></div>
                    <div><div class="date">📅 Deadline: ${formattedDate}</div>${timerHtml}
                        <div class="actions">
                            <button class="btn-done" onclick="toggleTask(${task.id})">✅ ${task.completed ? 'RETURN' : 'DONE'}</button>
                            <button class="btn-del" onclick="deleteTask(${task.id})">DELETE</button>
                        </div>
                    </div>`;
                taskList.appendChild(card);
            });
            updateAllTimers();
        }
        function updateAllTimers() {
            const timers = document.querySelectorAll('.live-timer'); let dataChanged = false; let tasks = getTasks();
            timers.forEach(timerElement => {
                const deadlineStr = timerElement.getAttribute('data-deadline'); const taskId = parseInt(timerElement.getAttribute('data-id'));
                const targetDate = new Date(deadlineStr); targetDate.setHours(23, 59, 59, 999); const now = new Date(); const diffMs = targetDate - now;
                const currentTask = tasks.find(tsk => tsk.id === taskId);
                if (diffMs <= 0) {
                    if (currentTask && currentTask.completed) { tasks = tasks.filter(tsk => tsk.id !== taskId); dataChanged = true; return; }
                    timerElement.innerHTML = "🔴 Time's up"; timerElement.style.color = "var(--danger-color)"; return;
                }
                const diffSecs = Math.floor(diffMs / 1000); const diffMins = Math.floor(diffSecs / 60); const diffHours = Math.floor(diffMins / 60); const diffDays = Math.floor(diffHours / 24);
                if (currentTask && currentTask.completed) { timerElement.innerHTML = "🎉 Task completed!"; timerElement.style.color = "var(--success-color)"; }
                else if (diffDays >= 1) { timerElement.innerHTML = `🟢 Time left: ${diffDays} days`; timerElement.style.color = "var(--success-color)"; }
                else {
                    const hours = String(diffHours % 24).padStart(2, '0'); const minutes = String(diffMins % 60).padStart(2, '0'); const seconds = String(diffSecs % 60).padStart(2, '0');
                    timerElement.innerHTML = `⏳ Time left: ${hours}:${minutes}:${seconds}`; timerElement.style.color = "#ffb74d";
                }
            });
            if (dataChanged) { saveTasks(tasks); renderTasks(); }
        }
        function exportData() {
            const tasks = getTasks(); const savedNotes = localStorage.getItem("diary_notes_data") || "";
            if (tasks.length === 0 && savedNotes.trim() === "") { alert("The list is empty."); return; }
            let textMessage = "📌 Homework Assignment:\n\n";
            tasks.forEach(task => {
                const dateObj = new Date(task.deadline); const formattedDate = isNaN(dateObj) ? task.deadline : dateObj.toLocaleDateString("en-US");
                const sData = subjectsData.find(s => s.id === task.subjectId) || subjectsData[subjectsData.length - 1];
                let statusText = task.completed ? " [COMPLETED]" : "";
                textMessage += `${sData.emoji} ${sData.en}${statusText} (Deadline: ${formattedDate}) — ${task.text}\n\n`;
            });
            if (savedNotes.trim() !== "") { textMessage += `📝 Notes:\n${savedNotes.trim()}\n`; }
            navigator.clipboard.writeText(textMessage.trim()).then(() => { alert("All homework and notes copied!"); });
        }
    </script>
</body>
</html>
